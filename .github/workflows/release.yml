name: Release CI

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true

    - name: Install system dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y meson ninja-build pkg-config


    - name: Clone and bootstrap vcpkg (Linux)
      run: |
        git clone https://github.com/microsoft/vcpkg.git vcpkg
        cd vcpkg
        ./bootstrap-vcpkg.sh
        cd ..
        export VCPKG_ROOT="$PWD/vcpkg"
        # Install required ports explicitly to avoid relying on a specific baseline commit
        ./vcpkg/vcpkg install gtk4 libadwaita "gstreamer[base,good,bad,ugly]" --triplet x64-linux || (sleep 5 && ./vcpkg/vcpkg install gtk4 libadwaita "gstreamer[base,good,bad,ugly]" --triplet x64-linux)
        # Ensure pkg-config can find vcpkg-provided .pc files if present
        export PKG_CONFIG_PATH="$VCPKG_ROOT/installed/x64-linux/lib/pkgconfig:$VCPKG_ROOT/installed/x64-linux/share/pkgconfig:$PKG_CONFIG_PATH"

    - name: Debug vcpkg and gtk4 (Linux)
      run: |
        echo "VCPKG_ROOT=$VCPKG_ROOT"
        ls -la "$VCPKG_ROOT"
        pkg-config --modversion gtk4 || true

    - name: Configure Meson build
      run: meson setup builddir --cross-file "$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

    - name: Compile project
      run: meson compile -C builddir

    - name: Archive artifacts (Linux)
      run: |
        mkdir staging
        cp builddir/src/amberol staging/
        tar -czvf amberol-linux.tar.gz -C staging .

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: amberol-linux
        path: amberol-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: x86_64-pc-windows-msvc # Assuming MSVC toolchain for Windows
        profile: minimal
        override: true

    - name: Clone and bootstrap vcpkg (Windows)
      shell: powershell
      run: |
        git clone https://github.com/microsoft/vcpkg.git vcpkg
        Set-Location vcpkg
        # Try fetching the baseline commit specifically, otherwise fetch all history
        if (-not (git fetch origin 5c16353d97ac9dfb33230c1e4f4b2323a67d87b1 --depth=1)) {
          git fetch --all
        }
        git checkout 5c16353d97ac9dfb33230c1e4f4b2323a67d87b1
        .\bootstrap-vcpkg.bat
        Set-Location ..
        $env:VCPKG_ROOT = "${{ github.workspace }}\vcpkg"
        .\vcpkg\vcpkg.exe install --triplet x64-windows -disableMetrics || (Start-Sleep -s 5; .\vcpkg\vcpkg.exe install --triplet x64-windows -disableMetrics)

    - name: Clone and bootstrap vcpkg (Windows)
      shell: powershell
      run: |
        git clone https://github.com/microsoft/vcpkg.git vcpkg
        Set-Location vcpkg
        .\bootstrap-vcpkg.bat
        Set-Location ..
        $env:VCPKG_ROOT = "${{ github.workspace }}\vcpkg"
        # Install required ports explicitly; use PowerShell friendly invocation
        & "$env:VCPKG_ROOT\vcpkg.exe" install 'gtk4' 'libadwaita' 'gstreamer[base,good,bad,ugly]' --triplet x64-windows

    - name: Debug vcpkg (Windows)
      shell: powershell
      run: |
        Write-Host "VCPKG_ROOT=$env:VCPKG_ROOT"
        Get-ChildItem -Path $env:VCPKG_ROOT -Force

    - name: Setup Meson and Ninja
      run: pip install meson ninja
      
    - name: Configure Meson build (Windows)
      # Meson needs to find vcpkg toolchain file. lukka/action-vcpkg helps set up env vars.
      run: meson setup builddir --cross-file "$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
      shell: bash # Use bash for meson setup to correctly interpret cross-file path

    - name: Compile project (Windows)
      run: meson compile -C builddir
      shell: bash

    - name: Archive artifacts (Windows)
      run: |
        mkdir staging
        cp builddir/src/amberol.exe staging/
        tar -czvf amberol-windows.tar.gz -C staging .
      shell: bash

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: amberol-windows
        path: amberol-windows.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true

    - name: Install system dependencies (macOS)
      run: |
        brew update
        # Homebrew package names might vary; these are common ones.
        # Libadwaita might require a tap, e.g., 'brew install adwaita-template/adwaita/libadwaita'
        brew install gtk4 libadwaita gstreamer gst-plugins-base gst-plugins-bad gst-plugins-good gst-plugins-ugly meson ninja

    - name: Configure Meson build (macOS)
      run: meson setup builddir

    - name: Compile project (macOS)
      run: meson compile -C builddir

    - name: Archive artifacts (macOS)
      run: |
        mkdir staging
        cp builddir/src/amberol staging/
        tar -czvf amberol-macos.tar.gz -C staging .

    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: amberol-macos
        path: amberol-macos.tar.gz

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/amberol-linux/amberol-linux.tar.gz
          artifacts/amberol-windows/amberol-windows.tar.gz
          artifacts/amberol-macos/amberol-macos.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
