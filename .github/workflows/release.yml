name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Amberol (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [1.72.0]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: ${{ matrix.rust }}
          override: true

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            ninja-build \
            gettext \
            cmake \
            pkg-config
          python3 -m pip install --user meson

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install gtk4 libadwaita gstreamer gst-plugins-base ninja gettext cmake pkg-config meson

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install gtk4 libadwaita gstreamer gst-plugins-base ninja cmake gettext python3 --yes
          python -m pip install --user meson
          refreshenv

      - name: Add Meson to PATH
        if: runner.os != 'macOS'
        run: |
          echo "$HOME/.local/bin:$PATH" >> $GITHUB_ENV

      - name: Create build directory
        run: mkdir -p builddir

      - name: Configure Meson
        run: meson setup builddir

      - name: Build with Ninja
        run: ninja -C builddir

      - name: Install Amberol
        run: ninja -C builddir install

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amberol-${{ matrix.os }}
          path: builddir/install
