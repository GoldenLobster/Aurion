name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build for all platforms
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y meson ninja-build gettext pkg-config libgtk-4-dev libadwaita-1-dev

      - name: Install build dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install meson ninja gettext gtk4 libadwaita

      - name: Install build dependencies
        if: runner.os == 'Windows'
        run: |
          choco install meson -y
          choco install ninja -y
          choco install gtk4 -y
          choco install pkgconfiglite -y

      - name: Build project
        run: |
          mkdir -p builddir
          meson setup builddir --buildtype release
          meson compile -C builddir

      - name: Copy required resources
        run: |
          mkdir -p builddir/install/share/amberol
          cp src/amberol.gresource builddir/install/share/amberol/amberol.gresource || echo "amberol.gresource not found yet"
          cp -r data/* builddir/install/share/amberol/

      - name: Package artifacts
        run: |
          mkdir -p release
          tar czf release/amberol-${{ matrix.os }}.tar.gz -C builddir/install/share amberol

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: amberol-${{ matrix.os }}
          path: release/
