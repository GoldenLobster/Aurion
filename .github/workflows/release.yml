name: Release

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build Amberol
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [1.72.0]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: rust-lang/setup-rust@v2
        with:
          rust-version: ${{ matrix.rust }}

      - name: Install dependencies on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            meson ninja-build pkg-config \
            libglib2.0-dev libgtk-4-dev gettext \
            libadwaita-1-dev

      - name: Install dependencies on macOS
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install meson ninja gettext glib gtk4 libadwaita

      - name: Install dependencies on Windows
        if: runner.os == 'Windows'
        run: |
          choco install msys2 --yes
          refreshenv
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            mingw-w64-x86_64-toolchain \
            mingw-w64-x86_64-meson \
            mingw-w64-x86_64-ninja \
            mingw-w64-x86_64-glib2 \
            mingw-w64-x86_64-gettext \
            mingw-w64-x86_64-gtk4 \
            mingw-w64-x86_64-libadwaita

      - name: Create build directory
        run: meson setup builddir

      - name: Compile project
        run: meson compile -C builddir

      - name: Install project
        run: meson install -C builddir

      - name: Collect runtime files
        run: |
          mkdir -p release
          # Copy executable
          cp -r builddir/install/bin release/ || cp -r builddir/install/a/_temp/msys64/mingw64/bin release/
          # Copy gresource
          cp -r builddir/install/share/amberol/amberol.gresource release/
          # Copy metainfo and desktop (Linux/macOS)
          cp -r builddir/install/share/metainfo release/ || true
          cp -r builddir/install/share/applications release/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amberol-${{ runner.os }}
          path: release/
