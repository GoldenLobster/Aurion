name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    runs-on: ${{ matrix.os }}
    name: Build Amberol (${{ matrix.os }}, Rust ${{ matrix.rust }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: rust-lang/setup-rust@v2
        with:
          rust-version: ${{ matrix.rust }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            meson ninja-build pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-tools gettext

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install meson ninja pkg-config gtk4 libadwaita gstreamer gst-plugins-good gettext

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y meson ninja pkgconfiglite gtk4 gstreamer gstreamer-plugins-good gettext

      - name: Create build directory
        run: meson setup builddir

      - name: Build Amberol
        run: |
          meson compile -C builddir

      - name: Install Amberol
        run: |
          meson install -C builddir

      - name: Package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amberol-${{ matrix.os }}
          path: builddir/install
