name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build Amberol
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [1.72.0]

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: cargo-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y meson ninja-build pkg-config libglib2.0-dev libgtk-4-dev gettext

      - name: Install dependencies on macOS
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install meson ninja gettext glib gtk4

      - name: Install dependencies on Windows
        if: runner.os == 'Windows'
        run: |
          choco install msys2 --yes
          refreshenv
          pacman -Syu --noconfirm
          pacman -S --noconfirm mingw-w64-x86_64-toolchain mingw-w64-x86_64-meson mingw-w64-x86_64-ninja mingw-w64-x86_64-glib2 mingw-w64-x86_64-gettext mingw-w64-x86_64-gtk4

      - name: Build Amberol
        run: |
          mkdir -p builddir
          cd builddir
          meson setup --prefix="$PWD/install" ..
          meson compile -C .
          meson install -C .

      - name: Package release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd builddir/install
          zip -r amberol-${GITHUB_REF_NAME}-${{ runner.os }}.zip .

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v3
        with:
          name: amberol-${{ runner.os }}
          path: builddir/install/*.zip
