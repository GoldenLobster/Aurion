name: Release

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build Amberol (${{ matrix.os }}, Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [1.72.0]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: rust-lang/setup-rust@v2
        with:
          rust-version: ${{ matrix.rust }}

      # Install dependencies per OS
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential meson ninja-build pkg-config \
            libglib2.0-dev libgtk-4-dev gettext \
            libadwaita-1-dev \
            libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install gtk4 libadwaita meson ninja gettext gstreamer gst-plugins-base gst-plugins-good

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y gtk4 libadwaita gstreamer gst-plugins-base gst-plugins-good ninja

      - name: Create build directory
        run: meson setup builddir

      - name: Build project
        run: ninja -C builddir

      - name: Install built files
        run: ninja -C builddir install

      # Upload artifacts for later download
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amberol-${{ runner.os }}
          path: builddir/install
