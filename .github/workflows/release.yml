name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build Amberol
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            meson ninja-build pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-tools gettext

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install meson ninja pkg-config gtk4 libadwaita gstreamer gst-plugins-good gettext

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y meson ninja pkgconfiglite gtk4 gstreamer gstreamer-plugins-good gettext

      - name: Set up environment for Meson (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          export PATH="$HOME/.local/bin:$PATH"

      - name: Configure Meson build
        run: meson setup builddir

      - name: Build Amberol
        run: ninja -C builddir

      - name: Install Amberol
        run: ninja -C builddir install

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amberol-${{ matrix.os }}
          path: |
            builddir/amberol
            builddir/*.desktop
            builddir/*.metainfo.xml
            builddir/*.gresource
