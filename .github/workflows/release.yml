name: Release CI

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build pkg-config git libgtk-4-dev libadwaita-1-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev gettext desktop-file-utils

      - name: Verify system GTK4 (Linux)
        run: |
          pkg-config --modversion gtk4 || true

      - name: Configure Meson build
        run: meson setup builddir
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig

      - name: Compile project
        run: meson compile -C builddir
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig

      - name: Archive artifacts (Linux)
        run: |
          mkdir staging
          cp builddir/src/amberol staging/
          tar -czvf amberol-linux.tar.gz -C staging .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: amberol-linux
          path: amberol-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    continue-on-error: true
    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      PKG_CONFIG_PATH: ${{ github.workspace }}\vcpkg\installed\x64-windows\lib\pkgconfig;${{ github.workspace }}\vcpkg\installed\x64-windows\share\pkgconfig
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          profile: minimal
          override: true

      - name: Clone and bootstrap vcpkg (Windows)
        shell: powershell
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          Set-Location vcpkg
          .\bootstrap-vcpkg.bat
          Set-Location ..
          # If the vcpkg ports tree contains gtk4, install ports and export env; otherwise skip vcpkg and continue with a warning.
          if (Test-Path -Path "$PWD\vcpkg\ports\gtk4") {
            Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$pwd\vcpkg"
            Add-Content -Path $env:GITHUB_ENV -Value "PKG_CONFIG_PATH=$pwd\vcpkg\installed\x64-windows\lib\pkgconfig;$pwd\vcpkg\installed\x64-windows\share\pkgconfig"
            & "$pwd\vcpkg\vcpkg.exe" install 'gtk4' 'libadwaita' 'gstreamer[base,good,bad,ugly]' --triplet x64-windows --classic
            if ($LASTEXITCODE -ne 0) { Start-Sleep -s 5; & "$pwd\vcpkg\vcpkg.exe" install 'gtk4' 'libadwaita' 'gstreamer[base,good,bad,ugly]' --triplet x64-windows --classic }
          } else {
            Write-Host "WARNING: vcpkg does not contain a gtk4 port; skipping vcpkg install and proceeding."
            Add-Content -Path $env:GITHUB_ENV -Value "SKIP_VCPKG=true"
            Write-Host "Listing vcpkg/ports for debugging:"
            Get-ChildItem -Path "$PWD\vcpkg\ports" -Force | Select-Object -First 50
          }

      - name: Debug vcpkg (Windows)
        shell: powershell
        run: |
          Write-Host "VCPKG_ROOT=$env:VCPKG_ROOT"
          Get-ChildItem -Path $env:VCPKG_ROOT -Force

      - name: Windows toolchain diagnostics
        shell: cmd
        run: |
          rustc --version -vV 2>nul || echo rustc not found
          cargo --version 2>nul || echo cargo not found
          where cl.exe 2>nul || echo cl.exe not found
          where link.exe 2>nul || echo link.exe not found
          echo --- Checking for GTK4 in MSYS2 ---
          dir "C:\msys64\mingw64\lib\pkgconfig\gtk4.pc" 2>nul || echo gtk4.pc not found
          echo --- Checking pkg-config paths ---
          pkg-config --variable pc_path pkg-config 2>nul || echo pkg-config paths unavailable

      - name: Setup Meson and Ninja
        run: |
          pip install meson ninja
          choco install pkgconfiglite -y

      - name: Install GTK4 dev packages on Windows (MSYS2)
        shell: cmd
        run: |
          setlocal enabledelayedexpansion
          echo Checking MSYS2 installation...
          if exist "C:\msys64\msys2.exe" (
            echo MSYS2 found, updating pacman database
            C:\msys64\msys2.exe -defterm -no-start -here -c "pacman -Sy --noconfirm"
            echo Installing GTK4 and related packages
            C:\msys64\msys2.exe -defterm -no-start -here -c "pacman -S --noconfirm mingw-w64-x86_64-gtk4 mingw-w64-x86_64-libadwaita mingw-w64-x86_64-gstreamer mingw-w64-x86_64-pkg-config"
            echo Verifying GTK4 installation
            C:\msys64\msys2.exe -defterm -no-start -here -c "ls -la /mingw64/lib/pkgconfig/gtk4.pc"
            echo Adding MSYS2 to PATH
            setx PATH "C:\msys64\mingw64\bin;%PATH%"
          ) else (
            echo MSYS2 not found - GTK4 build on Windows will fail
            echo Attempting minimal install via Chocolatey as fallback
            choco install pkgconfiglite -y 2>nul || echo pkg-config install failed
          )

      - name: Configure Meson build (Windows) using Visual Studio environment if available
        shell: cmd
        run: |
          setlocal enabledelayedexpansion
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath 2^>nul`) do (
            set "VSINSTALL=%%i"
            echo Found Visual Studio at !VSINSTALL!
          )
          if defined VSINSTALL (
            set "VSDEV=!VSINSTALL!\Common7\Tools\VsDevCmd.bat"
            if exist "!VSDEV!" (
              echo Invoking meson inside VS dev environment
              call "!VSDEV!" -arch=amd64
              meson setup builddir
            ) else (
              echo VsDevCmd.bat not found, running meson setup without VS environment
              meson setup builddir
            )
          ) else (
            echo Visual Studio not found, running meson setup without VS environment
            meson setup builddir
          )

      - name: Compile project (Windows)
        run: meson compile -C builddir
        shell: bash

      - name: Archive artifacts (Windows)
        run: |
          mkdir staging
          cp builddir/src/amberol.exe staging/
          tar -czvf amberol-windows.tar.gz -C staging .
        shell: bash

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: amberol-windows
          path: amberol-windows.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install system dependencies (macOS)
        run: |
          brew update
          brew install gtk4 libadwaita gstreamer gst-plugins-base gst-plugins-bad gst-plugins-good gst-plugins-ugly meson ninja

      - name: Configure Meson build (macOS)
        run: meson setup builddir

      - name: Compile project (macOS)
        run: meson compile -C builddir

      - name: Archive artifacts (macOS)
        run: |
          mkdir staging
          cp builddir/src/amberol staging/
          tar -czvf amberol-macos.tar.gz -C staging .

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: amberol-macos
          path: amberol-macos.tar.gz

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/amberol-linux/amberol-linux.tar.gz
            artifacts/amberol-windows/amberol-windows.tar.gz
            artifacts/amberol-macos/amberol-macos.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
