name: Release CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
    
permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          echo "Installing GTK4 development files..."
          sudo apt-get install -y libgtk-4-dev || {
            echo "libgtk-4-dev installation failed, checking what's available:"
            apt-cache search libgtk-4
            exit 1
          }
          echo "Installing other dependencies..."
          sudo apt-get install -y meson ninja-build pkg-config git libadwaita-1-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev gettext desktop-file-utils libxml2-utils

      - name: Verify system GTK4 (Linux)
        run: |
          echo "=== Installed GTK packages ==="
          dpkg -l | grep -i gtk || echo "No GTK packages found"
          echo ""
          echo "=== Finding gtk4.pc ==="
          find /usr -name gtk4.pc 2>/dev/null || echo "gtk4.pc not found"
          echo ""
          echo "=== pkg-config default search paths ==="
          pkg-config --variable pc_path pkg-config || echo "Could not get pkg-config paths"
          echo ""
          echo "=== Trying to get GTK4 version ==="
          pkg-config --modversion gtk4 2>&1 || echo "GTK4 pkg-config not found"
          echo ""
          echo "=== All available .pc files ==="
          find /usr -name "*.pc" 2>/dev/null | head -20

      - name: Generate Cargo.lock (Linux)
        run: cargo generate-lockfile

      - name: Configure Meson build
        run: meson setup builddir
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:/usr/lib/pkgconfig

      - name: Compile project
        run: meson compile -C builddir
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:/usr/lib/pkgconfig

      - name: Archive artifacts (Linux)
        run: |
          mkdir staging
          cp builddir/src/amberol staging/
          tar -czvf amberol-linux.tar.gz -C staging .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: amberol-linux
          path: amberol-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSYS2 and install dependencies (GTK4, GStreamer)
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-pkg-config
            git
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-gdk-pixbuf2
            mingw-w64-x86_64-cairo
            mingw-w64-x86_64-gstreamer
            mingw-w64-x86_64-gst-plugins-base
            mingw-w64-x86_64-gst-plugins-bad
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-python-gobject
            mingw-w64-x86_64-appstream
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-gettext

      - name: Export MSYS2 mingw64 paths
        run: |
          echo "PATH=C:\\msys64\\mingw64\\bin;${PATH}" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=C:\\msys64\\mingw64\\lib\\pkgconfig" >> $GITHUB_ENV
          echo "GETTEXTDATADIR=C:\\msys64\\mingw64\\share\\gettext" >> $GITHUB_ENV

      - name: Install Rust GNU host toolchain (mingw)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable-x86_64-pc-windows-gnu
          profile: minimal
          override: true

      - name: Expose Windows Cargo bin to MSYS2
        shell: powershell
        run: |
          if (Test-Path "$Env:USERPROFILE\.cargo\bin") {
            Add-Content -Path $Env:GITHUB_ENV -Value "PATH=$Env:USERPROFILE\\.cargo\\bin;$Env:PATH"
            Write-Host "Exported $Env:USERPROFILE\.cargo\bin to PATH for MSYS2"
          } else {
            Write-Host "$Env:USERPROFILE\.cargo\bin not found; rustc may not be available in MSYS2 shell"
          }

      - name: Verify GTK4 and GStreamer (Windows)
        shell: msys2 {0}
        run: |
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
          pkg-config --modversion gtk4 || echo "gtk4 not found via pkg-config"
          pkg-config --modversion gstreamer-1.0 || echo "gstreamer not found via pkg-config"
          ls /mingw64/lib/pkgconfig | grep gtk4 || true

      - name: Ensure rustc/rustup available inside MSYS2
        shell: msys2 {0}
        run: |
          if command -v rustc >/dev/null 2>&1; then
            echo "rustc already available"
          else
            echo "Attempting to install mingw-w64 Rust via pacman..."
            pacman -Sy --noconfirm mingw-w64-x86_64-rust || true
            if command -v rustc >/dev/null 2>&1; then
              echo "rustc provided by pacman"
            else
              echo "Falling back to rustup installer inside MSYS2..."
              curl https://sh.rustup.rs -sSf | sh -s -- -y || true
              if [ -f "$HOME/.cargo/env" ]; then
                # shellcheck disable=SC1091
                . "$HOME/.cargo/env"
              else
                export PATH="$HOME/.cargo/bin:$PATH"
              fi
              rustup toolchain install stable-x86_64-pc-windows-gnu || true
              rustup default stable-x86_64-pc-windows-gnu || true
            fi
          fi
          # Persist cargo bin to subsequent steps
          echo "PATH=$HOME/.cargo/bin:$PATH" >> $GITHUB_ENV
          command -v rustc && rustc --version || echo "rustc not available yet"

      - name: Create Meson native file for mingw
        shell: msys2 {0}
        run: |
          mkdir -p builddir
          RUSTC_PATH=$(which rustc 2>/dev/null || echo "$HOME/.cargo/bin/rustc")
          echo "[binaries]" > builddir/native-windows.ini
          echo "c = 'cc'" >> builddir/native-windows.ini
          echo "cpp = 'c++'" >> builddir/native-windows.ini
          echo "ar = 'ar'" >> builddir/native-windows.ini
          echo "strip = 'strip'" >> builddir/native-windows.ini
          echo "rust = 'rustc'" >> builddir/native-windows.ini
          echo "Created builddir/native-windows.ini:" 
          sed -n '1,200p' builddir/native-windows.ini || true

      - name: Generate Cargo.lock (Windows)
        shell: msys2 {0}
        run: cargo generate-lockfile

      - name: Configure Meson build (Windows, mingw)
        shell: msys2 {0}
        run: |
          export PKG_CONFIG_PATH=/mingw64/lib/pkgconfig
          meson setup builddir --native-file builddir/native-windows.ini || meson setup builddir

      - name: Compile project (Windows)
        shell: msys2 {0}
        run: |
          export PKG_CONFIG_PATH=/mingw64/lib/pkgconfig
          meson compile -C builddir

      - name: Archive artifacts (Windows)
        shell: msys2 {0}
        run: |
          STAGING_DIR="staging"
          MINGW_BIN_DIR="/mingw64/bin"
          mkdir -p "$STAGING_DIR"
          
          # Copy the main executable
          cp builddir/src/amberol.exe "$STAGING_DIR/" || true
          
          # Copy essential GTK/GLib/Adwaita/GStreamer DLLs and their common dependencies.
          # The '|| true' is added to prevent the script from failing if a specific DLL
          # is unexpectedly not found, though ideally all listed DLLs should be present
          # if the packages were installed correctly.
          echo "Copying essential DLLs to staging directory..."
          cp "$MINGW_BIN_DIR/libadwaita-1-0.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libgdk_pixbuf-2.0-0.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libgio-2.0-0.dll" "$STAGING_DIR/" || true # Corrected from libgia-2.0-0.dll
          cp "$MINGW_BIN_DIR/libcairo-2.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libgtk-4-1.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libglib-2.0-0.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libgobject-2.0-0.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libgmodule-2.0-0.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libgthread-2.0-0.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libgstreamer-1.0-0.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libgstbase-1.0-0.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libgstbadvideo-1.0-0.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libintl-8.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libiconv-2.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libwinpthread-1.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libgcc_s_seh-1.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libstdc++-6.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/zlib1.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libpng16-16.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libjpeg-8.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libtiff-5.dll" "$STAGING_DIR/" || true
          cp "$MINGW_BIN_DIR/libxml2-2.dll" "$STAGING_DIR/" || true
          
          tar -czvf amberol-windows.tar.gz -C "$STAGING_DIR" . || true

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: amberol-windows
          path: amberol-windows.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install system dependencies (macOS)
        run: |
          brew update
          brew install gtk4 libadwaita gstreamer gst-plugins-base gst-plugins-bad gst-plugins-good gst-plugins-ugly meson ninja

      - name: Generate Cargo.lock (macOS)
        run: cargo generate-lockfile

      - name: Configure Meson build (macOS)
        run: meson setup builddir

      - name: Compile project (macOS)
        run: meson compile -C builddir

      - name: Archive artifacts (macOS)
        run: |
          mkdir staging
          cp builddir/src/amberol staging/
          tar -czvf amberol-macos.tar.gz -C staging .

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: amberol-macos
          path: amberol-macos.tar.gz

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ github.token }}
          files: |
            artifacts/amberol-linux/amberol-linux.tar.gz
            artifacts/amberol-windows/amberol-windows.tar.gz
            artifacts/amberol-macos/amberol-macos.tar.gz
