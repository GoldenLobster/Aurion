name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [1.72.0]

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          components: rustfmt, clippy
          override: true

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y meson ninja-build pkg-config libgtk-4-dev libadwaita-1-dev libgstreamer1.0-dev gettext

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install meson ninja pkg-config gtk4 libadwaita gstreamer gettext

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install meson ninja pkgconfiglite gtk4 gstreamer -y

      - name: Add Meson to PATH (Linux/Windows)
        if: runner.os != 'macOS'
        run: echo "PATH=$HOME/.local/bin:$PATH" >> $GITHUB_ENV

      - name: Configure Meson build
        run: meson setup builddir

      - name: Build project
        run: meson compile -C builddir --verbose

      - name: Install resources
        run: meson install -C builddir --destdir ${{ runner.temp }}/install

      - name: Package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amberol-${{ matrix.os }}
          path: ${{ runner.temp }}/install

      - name: Run tests
        run: cargo test --workspace --verbose
