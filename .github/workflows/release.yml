on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  release:
    types: [published]


jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build pkg-config rustc cargo \
            libgtk-4-dev libadwaita-1-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            blueprint-compiler appstream-util desktop-file-utils

      - name: Build
        run: |
          cargo generate-lockfile
          meson setup builddir
          meson compile -C builddir
          meson install -C builddir --destdir install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amberol-linux
          path: install

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install meson ninja pkg-config rust gtk4 libadwaita gstreamer blueprint-compiler appstream

      - name: Build
        run: |
          cargo generate-lockfile
          meson setup builddir
          meson compile -C builddir
          meson install -C builddir --destdir install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amberol-macos
          path: install

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-gstreamer
            mingw-w64-x86_64-gst-plugins-base
            mingw-w64-x86_64-gst-plugins-good
            mingw-w64-x86_64-gst-plugins-bad
            mingw-w64-x86_64-gst-plugins-ugly
            mingw-w64-x86_64-blueprint-compiler
            mingw-w64-x86_64-appstream-glib
            mingw-w64-x86_64-desktop-file-utils
            mingw-w64-x86_64-appstream
            mingw-w64-x86_64-gettext

      - name: Build
        env:
          PKG_CONFIG_PATH: /mingw64/lib/pkgconfig
        run: |
          cargo generate-lockfile
          meson setup builddir --prefix=/mingw64
          meson compile -C builddir
          meson install -C builddir --destdir install

      - name: Bundle runtime DLLs
        run: |
          mkdir -p artifact/bin
          cp install/mingw64/bin/*.exe artifact/bin/
          ldd artifact/bin/*.exe | grep mingw64 | awk '{print $3}' | xargs -I{} cp {} artifact/bin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amberol-windows
          path: artifact
