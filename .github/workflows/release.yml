name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Allow manual triggering

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions/setup-rust@v1
        with:
          rust-version: stable

      - name: Install dependencies
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: |
          sudo apt-get update || brew update
          sudo apt-get install -y ninja-build meson gettext libglib2.0-dev libgtk-4-dev libadwaita-1-dev

      - name: Install dependencies on Windows
        if: runner.os == 'Windows'
        run: |
          choco install -y meson ninja gettext

      - name: Build Rust project
        run: cargo build --release

      - name: Build Meson resources
        run: |
          meson setup builddir || meson configure builddir
          meson compile -C builddir

      - name: Copy gresource to target
        run: |
          mkdir -p target/release
          cp builddir/src/amberol.gresource target/release/amberol.gresource
        shell: bash

      - name: Package artifacts
        uses: actions/upload-artifact@v3
        with:
          name: amberol-${{ matrix.os }}
          path: target/release/
