name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Amberol (${{ matrix.os }}, Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true

      - name: Print Rust version
        run: rustc --version

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y meson ninja-build pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gettext

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install meson ninja pkg-config gtk4 libadwaita gstreamer gettext

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install meson ninja pkgconfiglite gtk4 gstreamer gettext -y
          refreshenv

      - name: Configure Meson build
        run: meson setup builddir

      - name: Build project
        run: meson compile -C builddir

      - name: Install project
        run: meson install -C builddir

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amberol-${{ matrix.os }}
          path: builddir/install
