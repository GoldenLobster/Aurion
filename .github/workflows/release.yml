name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Amberol
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [1.72.0]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: rust-lang/setup-rust@v2
        with:
          rust-version: ${{ matrix.rust }}
          profile: minimal

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            meson ninja-build pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly gstreamer1.0-libav \
            gettext

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install meson ninja pkg-config gtk4 libadwaita gstreamer gettext

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install meson ninja pkgconfiglite gstreamer gtk4 gettext -y
          refreshenv

      - name: Ensure Meson in PATH (Linux/macOS)
        if: runner.os != 'Windows'
        run: echo "$HOME/.local/bin:$PATH" >> $GITHUB_ENV

      - name: Setup Meson build directory
        run: meson setup builddir

      - name: Build project
        run: |
          meson compile -C builddir

      - name: Install resources
        run: |
          meson install -C builddir

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amberol-${{ runner.os }}
          path: |
            builddir/install
            builddir/src/amberol.gresource
            target/release/amberol
