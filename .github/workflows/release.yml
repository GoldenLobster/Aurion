name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y meson ninja-build gettext pkg-config libgtk-4-dev libadwaita-1-dev

      - name: Build with Cargo
        run: cargo build --release

      - name: Build resources
        run: |
          mkdir -p builddir
          meson setup builddir --buildtype release
          meson compile -C builddir

      - name: Package
        run: |
          mkdir -p release
          cp target/release/amberol release/
          cp src/amberol.gresource release/
          cp -r data release/
          tar czf amberol-linux.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: amberol-linux
          path: amberol-linux.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Windows dependencies
        run: |
          choco install meson -y
          choco install ninja -y
          choco install gtk4 -y
          choco install pkgconfiglite -y

      - name: Build with Cargo
        run: cargo build --release

      - name: Build resources
        run: |
          mkdir builddir
          meson setup builddir --buildtype release
          meson compile -C builddir

      - name: Package
        run: |
          mkdir release
          copy target\release\amberol.exe release\
          copy src\amberol.gresource release\
          xcopy /E /I data release\data
          powershell Compress-Archive -Path release\* -DestinationPath amberol-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: amberol-windows
          path: amberol-windows.zip

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install macOS dependencies
        run: |
          brew update
          brew install meson ninja gettext gtk4 libadwaita

      - name: Build with Cargo
        run: cargo build --release

      - name: Build resources
        run: |
          mkdir -p builddir
          meson setup builddir --buildtype release
          meson compile -C builddir

      - name: Package
        run: |
          mkdir -p release
          cp target/release/amberol release/
          cp src/amberol.gresource release/
          cp -r data release/
          tar czf amberol-macos.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: amberol-macos
          path: amberol-macos.tar.gz
